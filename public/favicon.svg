<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background circle -->
  <circle cx="16" cy="16" r="16" fill="#0a0908"/>

  <!-- Concentric stadium rings (top-down view), gold on dark -->
  <ellipse cx="16" cy="16" rx="13"  ry="9"   fill="none" stroke="#d4a843" stroke-width="1.1" stroke-opacity="0.35"/>
  <ellipse cx="16" cy="16" rx="10"  ry="6.8" fill="none" stroke="#d4a843" stroke-width="1.1" stroke-opacity="0.55"/>
  <ellipse cx="16" cy="16" rx="7"   ry="4.7" fill="none" stroke="#d4a843" stroke-width="1"   stroke-opacity="0.75"/>
  <ellipse cx="16" cy="16" rx="4"   ry="2.7" fill="none" stroke="#d4a843" stroke-width="0.9" stroke-opacity="0.9"/>

  <!-- Pitch fill -->
  <ellipse cx="16" cy="16" rx="4" ry="2.7" fill="#d4a843" fill-opacity="0.08"/>

  <!-- Center spot -->
  <circle cx="16" cy="16" r="1.1" fill="#d4a843" fill-opacity="0.9"/>
</svg>
